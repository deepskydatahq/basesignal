name: Bug Report
description: Report a bug in Basesignal
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What behavior did you expect instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Install `@basesignal/core`
        2. Call `buildProfile(...)` with ...
        3. See error ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of the affected package?
      placeholder: e.g., @basesignal/core@0.1.0
    validations:
      required: true

  - type: dropdown
    id: node-version
    attributes:
      label: Node.js version
      options:
        - "20"
        - "22"
        - Other
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Docker
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, logs, or screenshots.
    validations:
      required: false
