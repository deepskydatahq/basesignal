# Story: Visual Indicators and Polish
# Add completeness bars, confidence badges, and final styling polish.

id = "M013-E003-S002"
epic = "M013-E003"
title = "Visual Indicators and Polish"
status = "ready"
created = 2026-03-02
depends_on = ["M013-E003-S001"]

[outcome]
description = """
The report page has polished visual indicators for completeness and confidence.
Completeness scores show as horizontal progress bars with percentage labels.
Confidence values display with color-coded badges (green for high, yellow for
medium, gray for low). Tables have alternating row backgrounds for readability.
Section headings for analyzed sections show a subtle checkmark, while
not-analyzed sections show a dash icon. The overall page feels like a
well-formatted professional report.
"""

[acceptance_criteria]
criteria = [
    "Report header completeness shows as a horizontal progress bar with percentage label",
    "Overall confidence in header shows as a color-coded badge",
    "Section-level confidence percentages use color coding: green >= 70%, yellow >= 40%, gray < 40%",
    "Activation journey confidence (string: low/medium/high) maps to the same color scheme",
    "Tables have alternating row backgrounds (zebra striping) for readability",
    "Card hover state has a subtle shadow or border color change",
    "Section h2 headings for analyzed sections show a subtle checkmark indicator",
    "Section h2 headings for not-analyzed sections show a dash indicator",
    "Product list table completeness column shows mini progress bars",
    "All visual indicators are CSS-only (no images or external assets)",
    "npm run build succeeds",
    "All existing tests pass (npm run test:run)",
    "Tests verify: progress bar present for completeness, confidence badge present",
]

[context]
files_to_modify = [
    "packages/cli/src/commands/view.ts",
    "packages/cli/src/commands/view.test.ts",
]

[notes]
implementation_hints = """
Progress bar HTML:
```html
<div class="progress-bar">
  <div class="progress-fill" style="width: 83%"></div>
  <span class="progress-label">83%</span>
</div>
```

CSS:
```css
.progress-bar {
  position: relative; height: 1.25rem; background: #f3f4f6;
  border-radius: 4px; overflow: hidden;
}
.progress-fill { height: 100%; background: #3b82f6; border-radius: 4px; }
.progress-label {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; font-size: 0.75rem; font-weight: 600;
}
```

Confidence badge helper:
```typescript
function confidenceBadge(value: number): string {
  const pct = Math.round(value * 100);
  const cls = pct >= 70 ? 'conf-high' : pct >= 40 ? 'conf-med' : 'conf-low';
  return `<span class="conf-badge ${cls}">${pct}%</span>`;
}
```

CSS for confidence:
```css
.conf-badge { font-size: 0.8rem; padding: 0.1em 0.5em; border-radius: 3px; font-weight: 500; }
.conf-high { background: #d1fae5; color: #065f46; }
.conf-med { background: #fef3c7; color: #92400e; }
.conf-low { background: #f3f4f6; color: #6b7280; }
```

For string confidence (activation map), map: high→conf-high, medium→conf-med, low→conf-low.

Section status indicators — use CSS ::before on h2:
```css
section h2::before { content: '✓ '; color: #059669; }
section.not-analyzed h2::before { content: '— '; color: #9ca3af; }
```

Add a `not-analyzed` class to sections that show the fallback. This means
the section renderers should add this class when data is missing.

Zebra striping:
```css
tbody tr:nth-child(even) { background: #f9fafb; }
```

Mini progress bars for the product list — replace the "83%" text with a
small inline progress bar in the completeness column.
"""
