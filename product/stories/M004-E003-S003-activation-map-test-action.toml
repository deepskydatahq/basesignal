[context]
relevant_paths = [
    "convex/analysis/outputs/generateActivationMap.ts"
]

input_fixtures = []

depends_on = ["M004-E003-S002"]

[handoff]
implementation_hints = """
Add to convex/analysis/outputs/generateActivationMap.ts:

```typescript
export const testGenerateActivationMap = action({
  args: { productId: v.id("products") },
  handler: async (ctx, { productId }) => {
    const start = Date.now();

    const map = await ctx.runAction(
      internal.analysis.outputs.generateActivationMap.generateActivationMap,
      { productId }
    );

    const execution_time_ms = Date.now() - start;

    console.log(`Generated activation map in ${execution_time_ms}ms`);
    console.log(`  Stages: ${map.stages.length}`);
    console.log(`  Primary activation: L${map.primary_activation_level}`);
    map.stages.forEach((s) => {
      console.log(`    L${s.level} ${s.name}: ${s.value_moments_unlocked.length} moments, ${s.drop_off_risk} risk`);
    });

    return {
      map,
      stage_count: map.stages.length,
      transition_count: map.transitions.length,
      execution_time_ms
    };
  }
});
```
"""

reference_files = [
    "convex/analysis/lenses/orchestrate.ts"
]
