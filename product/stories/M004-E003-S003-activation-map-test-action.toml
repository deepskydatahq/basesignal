# Story: Activation Map Test Action
# Public action for testing activation map generation

id = "M004-E003-S003"
parent = "M004-E003"
title = "Add public test action for activation map generation"
status = "in-progress"
created = 2026-02-08

[outcome]
description = """
A public testGenerateActivationMap action allows manual testing of activation
map generation via Convex dashboard, with results logged and returned.
"""

[acceptance_criteria]
executable = true

[[acceptance_criteria.criteria]]
test = "unit"
description = "testGenerateActivationMap public action accepts productId"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Action calls generateActivationMap and returns full result"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Result includes execution_time_ms and stage count"

[[acceptance_criteria.criteria]]
test = "integration"
description = "Action callable from Convex dashboard"

[[acceptance_criteria.criteria]]
