[handoff]
implementation_hints = """
Extract from convex/analysis/convergence/:
- convergeAndTier.ts → packages/core/src/analysis/convergence.ts
- The LLM merge step currently calls Claude directly via shared.ts
- Refactor: accept an LlmProvider interface (or simple function) as parameter
- If no LLM provided, use directMerge() (deterministic cluster-to-moment)
- Quality report generation (QualityReport type) should also be extracted
- This is where the LLM provider interface from E004 will eventually plug in,
  but for now just accept a simple async function: (prompt: string) => Promise<string>

Example refactored signature:
```typescript
export async function converge(
  clusters: CandidateCluster[],
  options?: { llmProvider?: (prompt: string) => Promise<string> }
): Promise<ConvergenceResult>
```
"""
