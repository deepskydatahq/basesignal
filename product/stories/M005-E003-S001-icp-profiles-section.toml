# Story: Build ICPProfilesSection
# Display ICP persona cards with value moment priorities

id = "M005-E003-S001"
parent = "M005-E003"
title = "Build ICPProfilesSection component"
status = "in-progress"
created = 2026-02-11

[outcome]
description = """
An ICPProfilesSection component displays 2-3 persona cards in a responsive
grid. Each card shows name, description, confidence badge, value moment
priorities with priority level and relevance reason, and collapsible
subsections for activation triggers, pain points, and success metrics.
"""

[acceptance_criteria]
