description = "Persona cards render in a responsive grid layout"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Each card shows persona name, description, and confidence badge"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Value moment priorities display with priority level and relevance reason"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Collapsible subsections for activation triggers, pain points, success metrics"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Empty state renders when no ICP profiles exist"

[context]
