[handoff]
implementation_hints = """
1. In view-html.ts: add extraCss?: string to renderPage options type, inject before </style>
2. Create compare-sections.ts with:
   - ComparisonData interface (slug + all 7 output types nullable)
   - loadComparisonData(slug, productDir) — reads same files as renderProductReport
   - renderComparisonReport(slug1, slug2, productDir) — loads both, renders page with comparison CSS
3. Comparison CSS: .compare-layout max-width 1400px, .compare-grid with 2-col grid, product labels with blue/purple borders
4. Reuse SCROLL_SPY_SCRIPT from view-sections.ts (export it or duplicate)
"""
