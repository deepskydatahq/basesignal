[handoff]
implementation_hints = """
Refactor ActivationMapSection.tsx using ICPProfilesSection as the reference pattern:

1. **Replace the outer layout** - Change from `flex items-start gap-0 overflow-x-auto`
   to `grid grid-cols-1 md:grid-cols-2 gap-4`. Stages are sorted by level as before.

2. **Upgrade StageCard** - Use Card/CardHeader/CardTitle/CardContent from `@/components/ui/card`
   and Badge from `@/components/ui/badge` instead of raw styled divs:
   - CardHeader: level badge ("L{n}"), stage name as CardTitle, signal strength as Badge
   - CardContent: collapsible sections for triggers and value moments
   - Drop-off risk as a Badge in the header area or top of content

3. **Add collapsible sections** - Follow the CollapsibleSection pattern from ICPProfilesSection:
   - Import Collapsible, CollapsibleTrigger, CollapsibleContent
   - Use useState<Record<string, boolean>> for tracking open/closed state
   - ChevronDown/ChevronRight icons from lucide-react
   - "Trigger Events (N)" and "Value Moments (N)" as collapsible labels

4. **Primary activation highlight** - Keep the existing `ring-2 ring-indigo-500 bg-indigo-50`
   pattern for the card where `stage.level === activationMap.primary_activation_level`.

5. **Transitions** - Instead of inline arrow connectors between horizontally adjacent cards,
   show transition info as a small summary inside the source card's content area (bottom),
   e.g. "-> L{next}: {trigger_events.join(', ')} ({typical_timeframe})". This avoids the
   connector layout complexity that caused overlapping.

6. **Keep existing signal/risk color maps** - SIGNAL_COLORS and RISK_COLORS are fine, just
   apply them via the Badge component's className prop.

7. **Preserve data-testid="stage-card"** on each card root for test compatibility.

8. **Keep normalizeDropOffRisk** helper as-is.

The component signature `ActivationMapSection({ activationMap })` stays the same.
No backend or type changes are needed.
"""

reference_files = [
