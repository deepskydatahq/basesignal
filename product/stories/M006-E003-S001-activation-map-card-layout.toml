# Story: Redesign ActivationMapSection with card-based grid layout
# Replace horizontal scroll strip with responsive vertical card grid matching ICP pattern

id = "M006-E003-S001"
parent = "M006-E003"
title = "Redesign ActivationMapSection with card-based grid layout"
status = "complete"
created = 2026-02-12

[outcome]
description = """
ActivationMapSection is redesigned from a horizontal scrolling strip of narrow 240px
cards into a responsive vertical card grid (1 column on mobile, 2 columns on desktop).
Each stage renders as a full Card component with a header showing level badge, name, and
signal strength badge, plus collapsible detail sections for trigger events, value moments
unlocked, and drop-off risk. The primary activation level is highlighted with a distinct
indigo border and background. Stage transitions are shown as a compact summary between
or within cards. The layout matches the pattern established by ICPProfilesSection and
eliminates all content overlapping issues.
"""

