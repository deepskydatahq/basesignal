[notes]
implementation_hints = """
The nav bar should be a horizontal bar at the top of the report, below the
back link but above the report header:

```html
<nav class="section-nav">
  <a href="#identity" class="active">Identity</a>
  <a href="#journey">Journey</a>
  <a href="#icp-profiles">ICP Profiles</a>
  <a href="#value-moments">Value Moments</a>
  <a href="#measurement-spec">Measurement Spec</a>
  <a href="#lifecycle-states" class="dimmed">Lifecycle States</a>
</nav>
```

CSS:
```css
.section-nav {
  position: sticky; top: 0; z-index: 10;
  background: #fff; border-bottom: 1px solid #e5e7eb;
  padding: 0.5rem 0; margin-bottom: 1.5rem;
  display: flex; gap: 1.25rem; flex-wrap: wrap;
}
.section-nav a { color: #6b7280; font-size: 0.85rem; font-weight: 500; }
.section-nav a.active { color: #2563eb; border-bottom: 2px solid #2563eb; }
.section-nav a.dimmed { color: #d1d5db; }
```

IntersectionObserver script (inline, minimal):
```javascript
const nav = document.querySelector('.section-nav');
if (nav) {
  const links = nav.querySelectorAll('a[href^="#"]');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        links.forEach(l => l.classList.remove('active'));
        const link = nav.querySelector(`a[href="#${e.target.id}"]`);
        if (link) link.classList.add('active');
      }
    });
  }, { rootMargin: '-20% 0px -70% 0px' });
  document.querySelectorAll('section[id]').forEach(s => observer.observe(s));
}
```

To know which sections are analyzed, renderProductReport should track this
as it builds sections. Pass a list of analyzed section IDs to the nav renderer.

Approach: add a `renderSectionNav(analyzedSections: string[])` function that
builds the nav bar. Each section renderer already returns different HTML for
present vs missing data — extract a check or pass flags to renderProductReport.
"""
