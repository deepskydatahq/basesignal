# Story: Section Navigation
# Add a sticky navigation bar with links to all report sections.

id = "M013-E003-S001"
epic = "M013-E003"
title = "Section Navigation"
status = "ready"
created = 2026-03-02
depends_on = []

[outcome]
description = """
The product report page has a sticky navigation bar at the top that lists all
six report sections. Clicking a nav link scrolls to the corresponding section.
The layout adjusts so the nav bar stays visible while scrolling. The nav bar
shows which sections have data and which are "not yet analyzed". A minimal
IntersectionObserver script highlights the currently visible section in the nav.
"""

[acceptance_criteria]
criteria = [
    "Report page has a <nav> element with links to all six sections: Identity, Journey, ICP Profiles, Value Moments, Measurement Spec, Lifecycle States",
    "Each nav link uses href='#section-id' anchors matching the existing section IDs",
    "Nav bar uses sticky positioning (position: sticky; top: 0) so it stays visible while scrolling",
    "Nav bar has a clean, compact design — single horizontal row of links",
    "Nav bar has a subtle background/border to visually separate it from content",
    "A small inline <script> uses IntersectionObserver to highlight the current section's nav link",
    "The active nav link has a distinct visual style (bold, underline, or color change)",
    "Nav links for sections with 'Not yet analyzed' content are visually dimmed",
    "renderPage accepts an optional nav parameter to include the nav bar only on report pages",
    "Product list page does NOT show the section nav bar",
    "npm run build succeeds",
    "All existing tests pass (npm run test:run)",
]

[context]
files_to_modify = [
    "packages/cli/src/commands/view.ts",
    "packages/cli/src/commands/view.test.ts",
