[handoff]
implementation_hints = """
Create convex/analysis/outputs/generateActivationMap.ts:

```typescript
const ACTIVATION_MAP_PROMPT = `
You are creating an activation map showing how users progress through a product.

## Input Data
- Activation levels: {levels_summary}
- Value moments: {moments_summary}
- Suggested value unlock stages: {suggested_mappings}

## Task
Generate an activation map with stages, transitions, and value unlocks.

## Requirements
1. One stage per activation level (maintain the level numbers)

2. For each stage:
   - trigger_events: actions that move users INTO this stage (from criteria)
   - value_moments_unlocked: which value moments become accessible here
   - drop_off_risk: low/medium/high based on complexity of reaching this stage
   - drop_off_reasons: if medium/high, explain why users might get stuck

3. For transitions:
   - Define happy path transitions (L1->L2->L3->L4)
   - Include recovery paths where applicable (e.g., L2->L1 if user churns)
   - Estimate typical timeframes between stages

4. Identify primary_activation_level (the "aha moment" stage)

## Output Format
Return JSON ActivationMap object.
`;
```

Use Claude Sonnet. Temperature 0.2 for consistency.
"""

reference_files = [
    "convex/analysis/outputs/types.ts",
