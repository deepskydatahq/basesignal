[notes]
implementation_hints = """
The key insight: value moments grouped by product surface help the LLM discover entities.
If moments mention 'dashboard', 'report', 'experiment', 'session' — those surface names
hint at the core product entities.

Group format example:
## Product Surfaces → Entity Candidates
**Dashboard** (5 value moments):
- View real-time user journey flows (Tier 1)
- Generate behavioral analysis reports (Tier 2)
...
**Experiment** (3 value moments):
- Deploy A/B tests across platforms (Tier 1)
...

This replaces the old activation_event_templates and value_event_templates which
pre-computed event suggestions. In the new framework, we don't suggest events —
we provide context for entity and activity discovery.

The activation levels and lifecycle states feed into the Customer perspective:
the LLM should derive customer journey stages FROM these inputs (not generate them
independently).
"""
