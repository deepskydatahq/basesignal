# Story: Improve ICP generation prompt to prioritize daily users over marketing personas
# Update system prompt to distinguish core product users from buyers/evaluators/marketing personas

id = "M006-E002-S001"
parent = "M006-E002"
title = "Improve ICP generation prompt to prioritize daily users over marketing personas"
status = "complete"
created = 2026-02-12

[outcome]
description = """
The ICP_SYSTEM_PROMPT in generateICPProfiles.ts explicitly instructs Claude to
distinguish "core daily users" (who use the product every day) from "evaluators,
buyers, and marketing personas" (who the website talks about). The primary persona
must represent who the product is built for, not who appears most in marketing
content. Confidence scores reflect product-usage evidence, not content volume.
"""

