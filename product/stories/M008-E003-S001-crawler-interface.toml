[context]
relevant_paths = [
    "convex/crawledPages.ts",
]
input_fixtures = []
depends_on = ["M008-E001-S001"]

[handoff]
implementation_hints = """
Design the interface to be dead simple for contributors:

```typescript
interface Crawler {
  name: string;
  sourceType: SourceType;
  canCrawl(url: string): boolean;
  crawl(url: string, options?: CrawlOptions): Promise<CrawlResult>;
}

interface CrawlResult {
  pages: CrawledPage[];
  timing: { startedAt: number; completedAt: number; totalMs: number };
  errors: { url: string; error: string }[];
}

interface CrawledPage {
  url: string;
  pageType: string; // 'homepage', 'features', 'pricing', 'about', 'docs', 'help'
  title?: string;
  content: string;
  metadata?: { description?: string; ogImage?: string; structuredData?: unknown };
}
```

The registry is a simple map. getCrawlersFor(url) returns all crawlers where
canCrawl(url) returns true. Default crawlers are auto-registered.

Reference convex/crawledPages.ts for the current CrawledPage shape.
"""
reference_files = [
    "convex/crawledPages.ts",
]
