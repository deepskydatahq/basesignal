# Story: Crawler Interface and Registry
# Define the Crawler interface, CrawlResult types, and crawler registration system.

id = "M008-E003-S001"
parent = "M008-E003"
title = "Define Crawler interface, CrawlResult types, and registry"
status = "complete"
created = 2026-02-14

[outcome]
description = """
packages/crawlers/ exists with a well-defined Crawler interface, CrawlResult
types, and a CrawlerRegistry that discovers and manages crawlers at runtime.
The interface is simple enough that community contributors can implement new
crawlers in an afternoon.
"""

