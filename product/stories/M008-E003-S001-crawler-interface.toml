executable = true

[[acceptance_criteria.criteria]]
test = "unit"
description = "Crawler interface exports: name, sourceType, canCrawl(url), crawl(url, options)"

[[acceptance_criteria.criteria]]
test = "unit"
description = "CrawlResult type includes: pages (with url, content, pageType, metadata), timing, errors"

[[acceptance_criteria.criteria]]
test = "unit"
description = "CrawlOptions type includes: maxPages, maxDepth, timeout, userAgent"

[[acceptance_criteria.criteria]]
test = "unit"
description = "CrawlerRegistry.register(crawler) and CrawlerRegistry.getCrawlersFor(url) work"

[[acceptance_criteria.criteria]]
test = "unit"
description = "sourceType enum covers: 'website', 'social', 'reviews', 'docs', 'video', 'pricing'"

[[acceptance_criteria.criteria]]
test = "unit"
