[handoff]
implementation_hints = """
Each doc should be standalone and actionable:

getting-started.md:
- Prerequisites (Node.js 18+, LLM API key)
- Install (@basesignal/cli)
- First scan (basesignal scan <url>)
- View results (basesignal export)
- Connect to Claude Desktop
- Next steps (customize, contribute)

data-model.md:
- Overview of ProductProfile
- Each section explained (identity, journey, definitions, entities, etc.)
- Example profile (from Linear or Miro test case)
- Schema versioning

mcp-tools.md:
- Each tool: name, description, parameters, return value, example
- scan_product, get_profile, get_definition, update_definition, export_profile

crawlers.md:
- Crawler interface
- Built-in crawlers
- How to build a new crawler (step-by-step)
- Testing crawlers with fixtures

self-hosting.md:
- Docker setup
- Environment variables reference
- Storage options
- LLM provider configuration
- Updating
"""
