description = "python -m basesignal_loaders --platform posthog --api-key x --project-id y --output /tmp/out.json runs extraction"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Output JSON file matches AnalyticsTaxonomy schema"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Progress messages written to stderr"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Exit code 0 on success, 1 on error with error message on stderr"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Unknown platform argument returns exit code 1 with list of supported platforms"

[context]
