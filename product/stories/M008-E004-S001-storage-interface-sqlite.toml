input_fixtures = []
depends_on = ["M008-E001-S002"]

[handoff]
implementation_hints = """
Interface design:
```typescript
interface StorageAdapter {
  save(profile: ProductProfile): Promise<string>; // returns ID
  load(id: string): Promise<ProductProfile | null>;
  list(): Promise<ProfileSummary[]>;
  delete(id: string): Promise<boolean>;
  search(query: string): Promise<ProfileSummary[]>;
}
```

SQLite implementation:
- Use better-sqlite3 (synchronous, fast, no native build issues)
- Single table: profiles (id TEXT PRIMARY KEY, data JSON, name TEXT, url TEXT, updated_at INTEGER)
- Store profile as JSON blob in data column
- Index on name and url for search
- Auto-create ~/.basesignal/ directory and data.db file
- For tests: use ':memory:' database path

Reference convex/productProfiles.ts for the data shape and completeness calculation.
"""
reference_files = [
    "convex/productProfiles.ts",
]
