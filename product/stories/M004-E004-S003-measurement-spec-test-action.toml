[handoff]
implementation_hints = """
Add to convex/analysis/outputs/generateMeasurementSpec.ts:

```typescript
export const testGenerateMeasurementSpec = action({
  args: { productId: v.id("products") },
  handler: async (ctx, { productId }) => {
    const start = Date.now();

    const spec = await ctx.runAction(
      internal.analysis.outputs.generateMeasurementSpec.generateMeasurementSpec,
      { productId }
    );

    const execution_time_ms = Date.now() - start;

    const byCategory = spec.events.reduce((acc, e) => {
      acc[e.category] = (acc[e.category] || 0) + 1;
      return acc;
    }, {} as Record<string, number>);

    console.log(`Generated measurement spec in ${execution_time_ms}ms`);
    console.log(`  Total events: ${spec.total_events}`);
    console.log(`  By category:`, byCategory);
    console.log(`  Coverage: ${spec.coverage.activation_levels_covered.length} levels, ${spec.coverage.value_moments_covered.length} moments`);

    return {
      spec,
      total_events: spec.total_events,
      by_category: byCategory,
      execution_time_ms
    };
  }
});
```
"""

reference_files = [
    "convex/analysis/lenses/orchestrate.ts"
]
