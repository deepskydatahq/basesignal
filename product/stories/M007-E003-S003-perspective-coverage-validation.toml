# Story: Add three-perspective coverage validation and user state model checks
# Ensure the generated spec covers Customer, Product, and Interaction perspectives
# and that the user state model is derivable from generated events

id = "M007-E003-S003"
parent = "M007-E003"
title = "Add perspective coverage and user state model validation"
status = "in-progress"
created = 2026-02-12

[outcome]
description = """
The measurement spec validation ensures all three perspectives (Customer, Product,
Interaction) are represented in the generated events, and that the user state model
references events that actually exist in the spec. Coverage reporting includes
perspective distribution alongside existing activation-level and value-moment coverage.
"""

[acceptance_criteria]
executable = true

[[acceptance_criteria.criteria]]
test = "unit"
description = "Coverage computation includes perspective_distribution: { customer: number, product: number, interaction: number } showing event count per perspective"

[[acceptance_criteria.criteria]]
