depends_on = ["M007-E003-S002"]

[handoff]
implementation_hints = """
The coverage computation happens after parsing in generateMeasurementSpec.ts.
Currently it computes activation_levels_covered and value_moments_covered.

Add perspective distribution:

```typescript
const perspectiveDist = {
  customer: events.filter(e => e.perspective === "customer").length,
  product: events.filter(e => e.perspective === "product").length,
  interaction: events.filter(e => e.perspective === "interaction").length,
};
```

Add to the coverage object in the MeasurementSpec return value.

Update the MeasurementSpec.coverage type:

```typescript
coverage: {
  activation_levels_covered: number[];
  value_moments_covered: string[];
  perspective_distribution: {
    customer: number;
    product: number;
    interaction: number;
  };
};
```

User state model validation:

```typescript
function validateUserStateModel(
  states: UserState[],
  events: TrackingEvent[],
  activationLevels: ActivationLevel[]
): string[] {
  const warnings: string[] = [];
  const eventNames = new Set(events.map(e => e.name));

  for (const state of states) {
    for (const criterion of state.criteria) {
      if (!eventNames.has(criterion.event_name)) {
        warnings.push(
          `User state "${state.name}" references non-existent event "${criterion.event_name}"`
        );
      }
    }
  }

  // Check activated state aligns with activation levels
  const activatedState = states.find(s => s.name === "activated");
  if (activatedState) {
    // At least one criterion event should map to an activation level
    const activationEvents = events.filter(
      e => e.maps_to.type === "activation_level" || e.maps_to.type === "both"
    );
    const activationEventNames = new Set(activationEvents.map(e => e.name));
    const hasOverlap = activatedState.criteria.some(
      c => activationEventNames.has(c.event_name)
    );
    if (!hasOverlap) {
      warnings.push("Activated state criteria don't reference any activation-level events");
    }
  }

  return warnings;
}
```

Log warnings but don't fail — the LLM may not perfectly match event names
in the state model, and graceful degradation is better than hard failure.
"""

reference_files = [
    "convex/analysis/outputs/generateMeasurementSpec.ts",
    "convex/analysis/outputs/types.ts",
    "convex/analysis/outputs/generateMeasurementSpec.test.ts"
]
