description = "Validation warns if any perspective has zero events (all three should have at least one)"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Validation warns if 'product' perspective has fewer events than other perspectives (it should typically be the largest)"

[[acceptance_criteria.criteria]]
