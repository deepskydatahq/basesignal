parent = "M004-E001"
title = "Define output types for ICP, ActivationMap, and MeasurementSpec"
status = "ready"
created = 2026-02-08

[outcome]
description = """
TypeScript types define the structure for all three output artifacts: ICPProfile,
ActivationMap, and MeasurementSpec. Types reference existing ValueMoment and
ActivationLevel types where appropriate.
"""

