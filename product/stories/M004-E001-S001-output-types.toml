[handoff]
implementation_hints = """
Create convex/analysis/outputs/types.ts with the following structure:

```typescript
import { ValueMoment, ValueMomentTier } from "../convergence/types";
import { ActivationLevel, SignalStrength } from "../extractActivationLevels";

// --- ICP Profile Types ---

export interface ValueMomentPriority {
  moment_id: string;
  priority: 1 | 2 | 3;  // 1 = highest priority for this persona
  relevance_reason: string;
}

export interface ICPProfile {
  id: string;
  name: string;  // e.g., "Product Manager optimizing roadmap"
  description: string;
  value_moment_priorities: ValueMomentPriority[];
  activation_triggers: string[];  // Actions that activate this persona
  pain_points: string[];  // Problems this persona has
  success_metrics: string[];  // How they measure success
  confidence: number;
  sources: string[];
}

// --- Activation Map Types ---

export interface ActivationStage {
  level: number;  // Matches ActivationLevel.level
  name: string;
  signal_strength: SignalStrength;
  trigger_events: string[];  // Events that move user to this stage
  value_moments_unlocked: string[];  // moment_ids available at this stage
  drop_off_risk: "low" | "medium" | "high";
  drop_off_reasons?: string[];
}

export interface StageTransition {
  from_level: number;
  to_level: number;
  trigger_events: string[];
  typical_timeframe?: string;  // e.g., "1-3 days"
}

export interface ActivationMap {
  stages: ActivationStage[];
  transitions: StageTransition[];
  primary_activation_level: number;  // The "aha moment" level
  confidence: number;
  sources: string[];
}

// --- Measurement Spec Types ---

export interface EventProperty {
  name: string;
  type: "string" | "number" | "boolean" | "array";
  description: string;
  required: boolean;
}

export interface TrackingEvent {
  name: string;  // entity_action format: issue_created, cycle_completed
  description: string;
  properties: EventProperty[];
  trigger_condition: string;  // When to fire this event
  maps_to: {
    type: "value_moment" | "activation_level" | "both";
    moment_id?: string;
    activation_level?: number;
  };
  category: "activation" | "value" | "retention" | "expansion";
}

export interface MeasurementSpec {
  events: TrackingEvent[];
  total_events: number;
  coverage: {
    activation_levels_covered: number[];
    value_moments_covered: string[];
  };
  confidence: number;
  sources: string[];
}

// --- Generation Result Types ---

export interface OutputGenerationResult {
  productId: string;
  icp_profiles: ICPProfile[];
  activation_map: ActivationMap;
  measurement_spec: MeasurementSpec;
  generated_at: string;
  execution_time_ms: number;
}
```

Follow patterns from convergence/types.ts for consistency.
"""

reference_files = [
    "convex/analysis/convergence/types.ts",
    "convex/analysis/extractActivationLevels.ts"
]
