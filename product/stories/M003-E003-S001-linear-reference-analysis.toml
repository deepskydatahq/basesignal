implementation_hints = """
Create docs/reference/linear-value-moments.md as a reference document.

Structure:
```markdown
# Linear: Reference Value Moment Analysis

## Product Overview
- Issue tracking and project management for software teams
- Core proposition: Streamlined issue tracking with cycle-based workflow

## Known Value Moments

### Primary (Aha-Moment)
**Complete a cycle with team visibility**
- User tracks issues through a sprint/cycle to completion
- Team can see progress without status meetings
- Evidence: M002 activation L3 (workflow_optimizer) identified this

### Secondary Value Moments

1. **First issue tracked through workflow**
   - Create issue → assign → update status → resolve
   - Evidence: M002 activation L1-L2

2. **Team gains visibility without meetings**
   - Multiple team members see each other's progress
   - Board views, filters, progress indicators

3. **Triage workflow reduces noise**
   - Backlog grooming, prioritization views
   - Focus on what matters

4. **Roadmap connects to execution**
   - Projects → Issues → Progress visible
   - Planning and execution linked

5. **Development tools integrated**
   - GitHub PRs linked to issues
   - Slack notifications for updates

6. **Cross-team coordination**
   - Multiple teams, shared visibility
   - Evidence: M002 activation L4

## Activation Levels (from M002)
- L1 explorer (weak): create_first_issue
- L2 workflow_learner (medium): create_project + invite_team_member
- L3 workflow_optimizer (strong) ⭐ PRIMARY: complete_cycle + use_triage
- L4 product_workflow_master (very_strong): cross_team + insights
```

Sources:
- M002 activation extraction results
- Linear public website
- General product knowledge about Linear
"""

reference_files = [
