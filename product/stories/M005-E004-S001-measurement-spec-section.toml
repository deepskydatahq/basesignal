[outcome]
description = """
A MeasurementSpecSection component displays the generated measurement spec.
A summary bar shows total events, confidence, and category breakdown. Events
are grouped by category (activation, value, retention, expansion). Each
category has a table of events with expandable rows revealing property details.
"""

