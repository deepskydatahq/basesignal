2. From ActivationMap: collect all trigger_events from stages
3. From LifecycleStatesResult: collect event_name from entry_criteria and exit_triggers

Build a Map<string, {name, properties, sources}> keyed by event name.
Sources are tagged as 'measurement-spec', 'activation', 'lifecycle'.
Dedup by event name — merge sources.

Render as a table: Event Name | Properties | Sources.
Each source as a badge. Properties as comma-separated list or expandable.

Update SECTION_NAV_ITEMS: replace measurement-spec with measurement-plan.
Update renderProductReport to call new function with all three data sources.
Update analyzed set.
Remove old renderMeasurementSpecSection (and its helpers if no longer needed).
Actually keep the property helpers (renderPropertyTable) if the new section uses them.
"""
