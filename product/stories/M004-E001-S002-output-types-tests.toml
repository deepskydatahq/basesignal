[handoff]
implementation_hints = """
Create convex/analysis/outputs/types.test.ts with tests for:

1. Type structure validation:
   - Create sample objects matching each type
   - Verify TypeScript accepts them (compile-time)
   - Test type guards for runtime validation

2. Type guard implementation (add to types.ts):
```typescript
export function isICPProfile(obj: unknown): obj is ICPProfile {
  return (
    typeof obj === "object" &&
    obj !== null &&
    "id" in obj &&
    "name" in obj &&
    "value_moment_priorities" in obj &&
    Array.isArray((obj as ICPProfile).value_moment_priorities)
  );
}
```

3. Test fixtures - create realistic examples:
```typescript
const sampleICPProfile: ICPProfile = {
  id: "icp-pm-001",
  name: "Product Manager optimizing roadmap",
  description: "PM focused on aligning team execution with product strategy",
  value_moment_priorities: [
    { moment_id: "vm-001", priority: 1, relevance_reason: "Core workflow" }
  ],
  activation_triggers: ["create_roadmap", "link_issues_to_initiatives"],
  pain_points: ["Lack of visibility into progress", "Scattered feedback"],
  success_metrics: ["Cycle completion rate", "Roadmap accuracy"],
  confidence: 0.8,
  sources: ["features page", "use cases page"]
};
```

Follow patterns from convergence/types.test.ts.
"""

reference_files = [
    "convex/analysis/outputs/types.ts",
    "convex/analysis/convergence/types.test.ts"
]
