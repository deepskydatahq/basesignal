# Story: Add value-moment-tier weighting to ICP input aggregation
# Weight roles by tier-1 moment density so core-user roles rank above marketing-heavy roles

id = "M006-E002-S002"
parent = "M006-E002"
title = "Add value-moment-tier weighting to ICP input aggregation"
status = "in-progress"
created = 2026-02-12

[outcome]
description = """
aggregateICPInputsCore in aggregateICPInputs.ts uses a weighted scoring formula
that heavily favors Tier 1 value moments when ranking roles. Roles that only
appear in low-tier (Tier 3+) marketing/security content are down-weighted
relative to roles with strong Tier 1 presence. The sort order uses
a composite score (tier_1_count * weight + occurrence_count) so that a role
with few but high-tier moments outranks a role with many low-tier moments.
"""

[acceptance_criteria]
executable = true

[[acceptance_criteria.criteria]]
test = "unit"
description = "RoleAggregation type includes tier_2_moments and tier_3_plus_moments count fields"

[[acceptance_criteria.criteria]]
test = "unit"
description = "aggregateICPInputsCore correctly counts tier_2_moments and tier_3_plus_moments per role"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Sorting uses weighted score: tier_1_moments * 5 + tier_2_moments * 2 + occurrence_count, descending"

[[acceptance_criteria.criteria]]
test = "unit"
description = "A role with 2 Tier 1 moments outranks a role with 10 Tier 3 moments and 0 Tier 1 moments"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Roles with only Tier 3+ moments sort to the bottom of the list"

[[acceptance_criteria.criteria]]
test = "unit"
