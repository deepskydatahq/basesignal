# Story: Build ActivationMapSection
# Display activation stage progression with signal strength and transitions

id = "M005-E003-S002"
parent = "M005-E003"
title = "Build ActivationMapSection component"
status = "complete"
created = 2026-02-11

[outcome]
description = """
An ActivationMapSection component displays activation stages as a horizontal
progression. Each stage card shows level, name, signal strength badge, trigger
events, value moments unlocked, and drop-off risk indicator. Transitions
between stages show trigger events and timeframe. The primary activation
level is visually highlighted.
"""

[acceptance_criteria]
executable = true

[[acceptance_criteria.criteria]]
test = "unit"
description = "Stages render as horizontal progression cards sorted by level"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Each stage shows level + name, signal strength badge (color-coded)"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Trigger events and value moments unlocked display on each stage"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Drop-off risk indicator renders as green/amber/red"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Transition connectors between stages show trigger events and timeframe"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Primary activation level highlighted with distinct border/background"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Handles drop_off_risk as both { level, reason } object and string defensively"

[[acceptance_criteria.criteria]]
test = "unit"
