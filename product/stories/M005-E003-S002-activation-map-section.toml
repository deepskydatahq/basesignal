[handoff]
implementation_hints = """
Create src/components/product-profile/ActivationMapSection.tsx:

```typescript
interface Props {
  activationMap: ActivationMap
}

export function ActivationMapSection({ activationMap }: Props) {
  const sortedStages = [...activationMap.stages].sort((a, b) => a.level - b.level)
  const isPrimary = (level: number) => level === activationMap.primary_activation_level

  // Horizontal card layout (flex row, overflow-x-auto)
  // Between cards: transition connector (arrow + trigger events + timeframe)
  // Primary stage: ring-2 ring-indigo-500 or similar highlight
  // Signal strength colors: very_strong=indigo, strong=green, medium=amber, weak=gray
  // Drop-off risk: handle both string and { level, reason } shapes
}
```

Signal strength badge colors match the activation level strength.
Drop-off risk: normalize defensively — if string, use as-is; if object, use .level.
"""

