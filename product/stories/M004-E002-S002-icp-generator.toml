# Story: ICP Generator
# LLM-powered ICP profile generation from aggregated data

id = "M004-E002-S002"
parent = "M004-E002"
title = "Implement LLM-powered ICP profile generator"
status = "in-progress"
created = 2026-02-08

[outcome]
description = """
An internalAction uses Claude to generate 2-3 distinct ICP profiles from
aggregated role and value moment data, producing personas with prioritized
value moments, activation triggers, and success metrics.
"""

[acceptance_criteria]
executable = true

[[acceptance_criteria.criteria]]
