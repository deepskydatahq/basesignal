[handoff]
implementation_hints = """
These are the easiest extractions — the code is already framework-agnostic:

- convex/lib/similarity.ts → packages/core/src/analysis/similarity.ts
  Pure TF-IDF: tokenize, termFrequency, inverseDocumentFrequency, cosineSimilarity
  Zero dependencies, already has tests

- convex/analysis/convergence/clusterCandidates.ts → packages/core/src/analysis/clustering.ts
  clusterCandidatesCore() is already a pure function
  Union-Find algorithm with same-lens constraint
  Depends only on similarity.ts

- convex/analysis/convergence/validateCandidates.ts → packages/core/src/analysis/validation.ts
  Deterministic checks only (not the LLM review part)
  runDeterministicChecks(), isFeatureAsValue(), isVagueLanguage(), etc.
  Depends on similarity.ts for deduplication

Copy tests as-is, update imports.
"""
