executable = true

[[acceptance_criteria.criteria]]
test = "unit"
description = "When spec has entities, the entity view is rendered by default"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Each entity renders as a card with name, description, and event count badge"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Entity card includes a property table showing name, type, description, and required badge"

[[acceptance_criteria.criteria]]
test = "unit"
