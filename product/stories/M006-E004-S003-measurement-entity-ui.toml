[[acceptance_criteria.criteria]]
test = "unit"
description = "Toggle button switches between 'By Entity' and 'By Category' views"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Category view continues to work identically to current implementation"

[[acceptance_criteria.criteria]]
test = "unit"
description = "When spec has no entities (legacy data), category view is shown and toggle is hidden"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Summary bar shows entity count alongside event count when entities are present"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Events without an entity_id are shown in an 'Ungrouped' section in entity view"

