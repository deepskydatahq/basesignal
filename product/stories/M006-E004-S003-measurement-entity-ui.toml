[handoff]
implementation_hints = """
Update MeasurementSpecSection.tsx to add entity-grouped view:

1. Add a groupEventsByEntity helper:
```typescript
function groupEventsByEntity(
  events: TrackingEvent[],
  entities: EntityDefinition[]
): Map<string, { entity: EntityDefinition; events: TrackingEvent[] }> {
  const map = new Map();
  for (const entity of entities) {
    map.set(entity.id, { entity, events: [] });
  }
  // Ungrouped bucket for events without entity_id
  map.set("__ungrouped", { entity: null, events: [] });
  for (const event of events) {
    const bucket = event.entity_id && map.has(event.entity_id)
      ? event.entity_id
      : "__ungrouped";
    map.get(bucket)!.events.push(event);
  }
  return map;
}
```

2. Add an EntityCard component:
```typescript
function EntityCard({ entity, events }: { entity: EntityDefinition; events: TrackingEvent[] }) {
  // Render entity name + description
  // Render property table (entity.properties) with columns: Property, Type, Required, Description
  // Render events using existing EventRow component
}
```

3. Add view toggle state:
```typescript
const [viewMode, setViewMode] = useState<"entity" | "category">(
  measurementSpec.entities?.length ? "entity" : "category"
);
```

4. Render toggle buttons in the summary bar area — use simple button group or
   tab-like styling consistent with the existing Tailwind approach. Example:
```tsx
{measurementSpec.entities?.length && (
  <div className="flex rounded-md border border-gray-200 overflow-hidden">
    <button
      className={`px-3 py-1 text-xs ${viewMode === "entity" ? "bg-gray-100 font-medium" : ""}`}
      onClick={() => setViewMode("entity")}
    >By Entity</button>
    <button
      className={`px-3 py-1 text-xs ${viewMode === "category" ? "bg-gray-100 font-medium" : ""}`}
      onClick={() => setViewMode("category")}
    >By Category</button>
  </div>
)}
```

5. Import the new types (EntityDefinition, EntityProperty) from types.ts.

6. The existing category view code (groupEventsByCategory, category sections) should
   remain unchanged — just conditionally rendered when viewMode === "category".

7. For the entity property table, reuse the existing Table/TableRow/TableCell components
   already imported. Add a "Required" column with a small badge.

8. Update the summary bar to show entity count: "{entities.length} entities, {total_events} events"
   when entities are present.
"""

