# Story: Update MeasurementSpecSection UI to display entity-grouped events
# Add entity view with entity cards, property tables, and nested events

id = "M006-E004-S003"
parent = "M006-E004"
title = "Update MeasurementSpecSection UI to display entity-grouped events"
status = "in-progress"
created = 2026-02-12

[outcome]
description = """
The MeasurementSpecSection component can display events grouped by entity in
addition to the existing category view. When entities are present in the
measurement spec, the default view shows entity cards — each card displays the
entity name, description, a property table, and nested events belonging to that
entity. A toggle allows switching between entity view and category view. The
category view remains the fallback when no entities are defined (backwards compat).
"""

