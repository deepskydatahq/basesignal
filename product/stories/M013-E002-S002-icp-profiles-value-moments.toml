[outcome]
description = """
The product report page now includes ICP Profiles and Value Moments sections.
ICP profiles render as distinct cards showing name, description, pain points,
activation triggers, success metrics, value moment priorities, and confidence.
Value moments are grouped by tier (Core / Important / Supporting) and show
name, description, contributing lenses, roles, and product surfaces.
"""

[acceptance_criteria]
criteria = [
    "ICP Profiles section renders each profile as a visual card/block",
    "Each ICP card shows: name, description, confidence percentage",
    "Each ICP card lists: pain points, activation triggers, success metrics as bullet lists",
    "Each ICP card shows value moment priorities with priority level and relevance reason",
    "Value Moments section groups moments by tier: Tier 1 (Core), Tier 2 (Important), Tier 3 (Supporting)",
    "Each value moment shows: name, description, contributing lenses, roles, product surfaces",
    "Value moment lens count is displayed (e.g., '6 of 7 lenses converged')",
    "Data loaded from: outputs/icp-profiles.json and convergence/value-moments.json",
    "When ICP profiles file is missing or empty, shows 'Not yet analyzed'",
    "When value moments file is missing or empty, shows 'Not yet analyzed'",
    "Tests verify: ICP names render, value moments grouped by tier, missing sections handled",
    "npm run build succeeds",
    "All existing tests pass (npm run test:run)",
]

[context]
files_to_modify = [
    "packages/cli/src/commands/view.ts",
