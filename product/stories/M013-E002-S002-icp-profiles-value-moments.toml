[notes]
implementation_hints = """
ICP Profile data shape (from outputs/icp-profiles.json):
- Array of ~3 profiles
- Each: id, name, description, confidence (number 0-1)
- value_moment_priorities[]: { moment_id, priority (1|2|3), relevance_reason }
- activation_triggers[]: string[] (typically 4)
- pain_points[]: string[] (typically 4)
- success_metrics[]: string[] (typically 4)
- sources[]: string[] (usually empty)

Value Moment data shape (from convergence/value-moments.json):
- Array of moments
- Each: id, name, description, tier (1|2|3), lenses[], lens_count, roles[], product_surfaces[], contributing_candidates[]
- tier 1 = Core (highest convergence), tier 2 = Important, tier 3 = Supporting

Rendering approach:
- ICP profiles as cards with a subtle border/background
- Pain points, triggers, metrics as compact bullet lists
- Value moments grouped: first render tier 1, then 2, then 3
- Show tier label: "Core Value Moments", "Important", "Supporting"

Add CSS for cards:
```css
.card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
.card h3 { margin-top: 0; }
```
"""
