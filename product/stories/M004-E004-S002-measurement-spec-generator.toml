[outcome]
description = """
An internalAction uses Claude to generate a measurement specification with
trackable events, each with standardized names, properties, trigger conditions,
and mapping to value moments or activation levels.
"""

[acceptance_criteria]
executable = true

[[acceptance_criteria.criteria]]
