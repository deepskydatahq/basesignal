title = "Mixpanel taxonomy extractor"
status = "ready"
created = 2026-03-06

[outcome]
description = """Implement a DLT-based Mixpanel extractor that pulls event schemas from
the Mixpanel Lexicon API and normalizes to AnalyticsTaxonomy."""

[acceptance_criteria]
executable = true

[[acceptance_criteria.criteria]]
test = "unit"
description = "mixpanel_source() returns a DLT resource yielding lexicon schemas"

[[acceptance_criteria.criteria]]
test = "unit"
description = "normalize_mixpanel_events() converts Lexicon API response to list of TaxonomyEvent"

[[acceptance_criteria.criteria]]
test = "unit"
description = "extract_mixpanel_taxonomy(service_account, secret, project_id) returns AnalyticsTaxonomy"

[[acceptance_criteria.criteria]]
test = "unit"
description = "Unit tests with fixture JSON pass"

[context]
relevant_paths = [
    "packages/loaders/src/basesignal_loaders/",
]
