[handoff]
implementation_hints = """
Follow enrich-value-moments.ts exactly:
1. System prompt explaining outcomes + vocabulary + task
2. buildOutcomeEnrichmentUserPrompt() formatting outcomes + vocab
3. parseOutcomeEnrichmentResponse() validating response shape
4. enrichOutcomes() orchestrating: guard checks → LLM call → parse → merge
Key difference: outcomes use 'description' as identifier (no id field), so use index-based matching.
Reuse buildEventVocabulary() and formatVocabulary() from reconcile.ts.
"""
reference_files = [
    "packages/mcp-server/src/analysis/outputs/enrich-value-moments.ts",
