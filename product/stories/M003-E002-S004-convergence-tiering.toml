input_fixtures = ["Candidate clusters from Linear product"]

depends_on = ["M003-E002-S003"]

[handoff]
implementation_hints = """
Create convex/analysis/convergence/convergeAndTier.ts as an internalAction.

Merge prompt for each cluster:
```
These candidates from different lenses appear to describe the same value moment:

{list of candidates with their lens and role}

1. Do these genuinely describe the same underlying value moment? If not, suggest splitting.
2. Write a single consolidated name: [Verb] + [what the user gets]
   - Good: "Gain visibility into team progress"
   - Bad: "Board view feature"
3. Write a consolidated description combining insights from all contributing lenses.
4. List the primary roles affected.
5. List the product surfaces involved.
```

Tiering logic:
```typescript
function assignTier(lens_count: number): ValueMomentTier {
  if (lens_count >= 5) return 1;
  if (lens_count >= 3) return 2;
  return 3;
}
```

Expected distribution for Linear:
- Tier 1 (5+ lenses): 4-6 moments - "obviously important" value
- Tier 2 (3-4 lenses): 4-8 moments - likely real, worth measuring
- Tier 3 (1-2 lenses): 5-15 moments - lens-specific or niche value

Final orchestration (runConvergencePipeline):
1. validateCandidates(lensResults) → ValidatedCandidate[]
2. clusterCandidates(validatedCandidates) → CandidateCluster[]
3. convergeAndTier(clusters) → ValueMoment[]

Add testRunConvergencePipeline public action for manual testing.
"""

reference_files = [
    "convex/analysis/convergence/types.ts",
    "convex/analysis/convergence/clusterCandidates.ts"
]
