depends_on = ["M007-E003-S001"]

[handoff]
implementation_hints = """
Type changes in types.ts:

```typescript
export interface EntityDefinition {
  id: string;
  name: string;
  description: string;
  properties: EntityPropertyDef[];
  isHeartbeat: boolean;  // NEW
}

export interface TrackingEvent {
  name: string;
  entity_id: string;
  description: string;
  properties: EventProperty[];  // event-specific only, entity props inherited
  trigger_condition: string;
  maps_to: MapsTo;
  category: string;
  perspective: "customer" | "product" | "interaction";  // NEW
}

export interface UserState {
  name: string;
  definition: string;
  criteria: { event_name: string; condition: string }[];
}

export interface MeasurementSpec {
  entities: EntityDefinition[];
  events: TrackingEvent[];
  total_events: number;
  coverage: {
    activation_levels_covered: number[];
    value_moments_covered: string[];
  };
  confidence: number;
  sources: string[];
  userStateModel: UserState[];  // NEW
}
```

Parser validation changes in generateMeasurementSpec.ts:

1. Entity heartbeat check:
   const heartbeats = entities.filter(e => e.isHeartbeat);
   if (heartbeats.length !== 1) throw error or default first entity

2. Event perspective check:
   const validPerspectives = ["customer", "product", "interaction"];
   if (!validPerspectives.includes(event.perspective)) default to "product"

3. Property inheritance check (warn, not error):
   For each event, get parent entity properties.
   If event.properties includes a name that matches entity property, log warning.

4. User state model check:
   Validate 5 states, each with name and criteria array.
   Gracefully default if LLM omits (generate placeholder states).

The frontend MeasurementSpecSection.tsx will need updates in a later story
to display the new perspective and user state model fields.
"""

reference_files = [
    "convex/analysis/outputs/types.ts",
    "convex/analysis/outputs/generateMeasurementSpec.ts",
    "convex/analysis/outputs/types.test.ts",
    "convex/analysis/outputs/generateMeasurementSpec.test.ts"
]
