# Story: Update types and parser validation for property inheritance and heartbeat
# The TypeScript types and response parser must enforce the new framework rules

id = "M007-E003-S002"
parent = "M007-E003"
title = "Update types and validation for property inheritance and heartbeat"
status = "complete"
created = 2026-02-12

[outcome]
description = """
TypeScript types and parser validation enforce the Double Three-Layer Framework:
EntityDefinition has isHeartbeat, TrackingEvent has perspective, event properties
are validated as event-specific additions (not duplicates of entity properties),
and exactly one heartbeat entity must exist.
"""

