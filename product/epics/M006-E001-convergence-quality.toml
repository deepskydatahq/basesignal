dependencies = []

[notes]
considerations = """
Root cause: TF-IDF cosine similarity is purely lexical. "Accelerate decision-making"
and "Enable faster collaborative choices" share few words but mean the same thing.
With threshold 0.7, almost nothing clusters, producing 111 single-candidate Tier 3 moments.

Approach options (in order of preference):

1. **LLM-assisted semantic clustering** (recommended)
   - Send all candidates to Claude, ask it to group related ones into 15-30 clusters
   - Preserve same-lens constraint as a rule in the prompt
   - One LLM call replaces the entire TF-IDF similarity matrix
   - Simple to implement, most accurate

2. **Embedding-based clustering**
   - Replace TF-IDF with embedding vectors for semantic similarity
   - Keep union-find + same-lens constraint
   - More deterministic but requires embedding API

3. **Lower threshold + post-processing**
   - Drop threshold from 0.7 to 0.3-0.4
   - Add post-convergence compression step
   - Least accurate, band-aid fix

Also consider adjusting tier thresholds:
- Current: 5+ lenses = T1, 3-4 = T2, 1-2 = T3
- With 7 lenses, getting 5+ in one cluster is very hard
- May need: 4+ = T1, 2-3 = T2, 1 = T3
- Or use LLM judgment for tier assignment based on importance, not just lens count

Stories:
1. Replace TF-IDF clustering with LLM-based semantic clustering
2. Refine tier assignment to produce target distribution
3. Add post-convergence quality validation
"""

estimated_stories = 3
