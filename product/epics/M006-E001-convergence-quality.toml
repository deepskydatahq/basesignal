parent = "M006"
title = "Value Moment Convergence Quality"
status = "active"
created = 2026-02-12

[outcome]
description = """
The convergence pipeline produces a well-distributed set of value moments:
2-3 Tier 1 (core), 5-6 Tier 2 (important), and max 20 Tier 3 (supporting).
Candidates that describe similar value in different words are correctly merged.
"""

job_story = """
When I run the analysis pipeline on a product,
I want to see a manageable set of tiered value moments that I can actually review,
so that I can understand the product's core value without drowning in 100+ items.
"""

[testing]
approach = "agent-judgment"
criteria = [
    "Miro test produces 2-3 Tier 1, 5-6 Tier 2, and <=20 Tier 3 moments",
    "Semantically similar candidates merge even with different wording",
    "Same-lens constraint is preserved (no cluster has two candidates from same lens)",
    "Total moment count is between 15 and 30",
    "Tier 1 moments feel 'obviously right' as core product value",
    "Existing convergence tests continue to pass"
]

validator_context = [
    "convex/analysis/convergence/clusterCandidates.ts",
