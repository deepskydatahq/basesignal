# Epic: Update convergence pipeline to produce user-experienced value moments
# Problem: Merge prompt produces abstract business outcomes ("Automate protection of...")
# Solution: Rewrite merge prompt to synthesize experiential moments

id = "M007-E002"
parent = "M007"
title = "Experiential Convergence"
status = "active"
created = 2026-02-12

[outcome]
description = """
The convergence pipeline (clustering + merge + tier) produces value moments that
describe what users actually experience. A product manager reading the value moments
would say "yes, that's exactly what our users do" — not "that sounds like our marketing
page." Moment names describe user actions with observable results, not abstract business
outcomes.
"""

job_story = """
When lens candidates are clustered and merged into value moments,
I want the resulting moments to describe user-experienced actions with visible outcomes,
so that a PM can immediately recognize each moment as something their users actually do.
"""

[testing]
approach = "agent-judgment"
criteria = [
    "Merge system prompt instructs LLM to produce experiential moments, not business outcomes",
    "Merge prompt includes good/bad examples: 'Create a shared whiteboard for brainstorming' (good) vs 'Optimize visual collaboration workflows' (bad)",
    "Moment names start with a user-action verb (Create, Share, Export, Drag, Build) not a business verb (Automate, Streamline, Optimize, Leverage)",
    "Moment descriptions reference specific product surfaces and UI elements",
    "Clustering prompt encourages grouping by shared user action, not by abstract theme",
    "Quality validation checks that moments are experiential (not just non-empty)",
    "All convergence tests still pass",
    "Miro test produces moments like 'Build a collaborative mood board' not 'Enable visual ideation workflows'"
]

validator_context = [
