dependencies = ["M007-E001"]

[notes]
considerations = """
**Root Cause Analysis**

The merge system prompt (convergeAndTier.ts:219-245) says:
  "Your job: Merge them into ONE cohesive value moment"
  "The name MUST start with a verb (Gain, Reduce, Accelerate, Eliminate, Enable)"

The suggested verbs are all BUSINESS verbs. "Gain visibility", "Reduce time",
"Accelerate delivery" — these frame moments as business outcomes. The user doesn't
"Gain visibility into project status" — they "Open the dashboard and see which tasks
are blocked."

**Fix Approach**

1. **Merge prompt rewrite** (convergeAndTier.ts):
   - Replace business verb examples with user-action verbs:
     "The name MUST start with a user-action verb (Create, Share, Export, Drag, Build,
      Invite, Comment, Vote, Upload, Arrange, Filter, Tag)"
   - Add explicit instruction: "Describe what happens on the user's screen, not what
     the business achieves"
   - Add paired examples:
     BAD: "Gain visibility into team workload distribution"
     GOOD: "View a heatmap showing who's overloaded this sprint"
     BAD: "Accelerate cross-functional alignment"
     GOOD: "Share a board link so marketing can comment on the wireframe"
   - Add rule: "The user should be able to point to a screen in the product where this
     moment happens"

2. **Clustering prompt update** (clusterCandidates.ts):
   - Current: "group candidates that describe the SAME underlying value moment"
   - Updated: "group candidates that describe the SAME user action or experience"
   - This shifts clustering from thematic grouping to action-based grouping

3. **Quality validation update** (convergeAndTier.ts quality checks):
   - Add check: does the moment name start with a user-action verb?
   - Business verbs (Gain, Reduce, Accelerate, Optimize, Streamline, Automate, Leverage,
     Enable, Enhance) → quality warning
   - User-action verbs (Create, Share, Export, Build, Drag, Invite, Comment, Vote,
     Upload, Filter, Tag, Open, View, Configure, Set, Move) → pass

**Estimated stories: 2**
- S001: Rewrite merge and clustering prompts for experiential framing
- S002: Add quality validation for experiential moment names
"""

estimated_stories = 2
