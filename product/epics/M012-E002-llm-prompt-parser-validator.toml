[outcome]
description = """
The measurement spec generator produces output following the Double Three-Layer Framework.
The system prompt teaches the LLM the framework: three perspectives, entity-centric design,
activities as past-tense lifecycle markers inside entities, entity-level properties with
per-activity properties_supported, customer activities with derivation_rule, and interaction
layer as generic element_clicked/element_submitted. The parser validates the new structure
and computes coverage metrics. The prompt builder assembles framework-aware context from
pipeline inputs. All measurement-spec.test.ts tests pass with updated fixtures.
"""

