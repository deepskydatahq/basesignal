[notes]
considerations = """
The system prompt is the most important piece — it teaches the LLM how to think
about tracking design. Key framework principles to encode:

1. Start from entities, not events. "What are the core objects users interact with?"
2. For each entity, define its lifecycle as past-tense activities.
3. Properties belong to entities. Activities pick which they support.
4. Customer layer is derived: "First value created = Board shared (first time) OR
   Asset created 30+ times" — this is a rule, not a directly tracked event.
5. Interaction layer is generic: element_clicked + element_submitted with contextual
   properties (element_type, element_text, element_position, element_container).
6. The heartbeat entity is "the core object without which the product disappears."

The prompt builder should group value moments by product surface to help the LLM
discover entities. If moments mention "dashboard", "report", "experiment" — those
are entity candidates.

Temperature stays at 0.2 for consistency. maxTokens may need to increase given
the richer output structure.

Validation is stricter than current: properties_supported must reference actual
entity property names (cross-reference check). This catches LLM hallucinations
where it invents property names in properties_supported that don't exist on the entity.
"""
