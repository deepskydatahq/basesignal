parent = "M007"
title = "Double Three-Layer Measurement Framework"
status = "active"
created = 2026-02-12

[outcome]
description = """
Measurement spec generation follows the Double Three-Layer Framework: entities define
properties once (3-7 reusable properties per entity), events inherit all parent entity
properties plus event-specific additions, activities use past-tense verbs, and the spec
covers three perspectives (Customer journey state, Product entity lifecycle, Interaction
details). A user state model (new, activated, active, at_risk, dormant) is derivable
from the generated events.
"""

job_story = """
When the pipeline generates a measurement specification,
I want events to inherit properties from their parent entities and cover three
analytical perspectives,
so that the resulting tracking plan is immediately implementable in Amplitude/Mixpanel
without a data team having to redesign it.
"""

