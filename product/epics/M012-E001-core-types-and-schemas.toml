[notes]
considerations = """
Key finding from codebase exploration:

Only MeasurementSpec is imported outside core. All sub-types (TrackingEvent,
EntityDefinition, EventProperty, MapsTo, etc.) are internal — used only within
core type definitions and mcp-server's parser. This means we can freely redesign
the internal type hierarchy without breaking external consumers, as long as the
top-level MeasurementSpec shape is correct.

The EntityProperty type gains richer type options from the book:
- id: identifier fields
- calculated: computed at query time (e.g., board_number_assets)
- experimental: temporary properties being tested
- temporary: properties with a planned removal date
- string/number/boolean/array: standard types

Note: This epic will temporarily break mcp-server (parser expects old types).
E002 fixes that. Build the types first so E002 has a target to parse into.

PerspectiveDistribution changes from a counted metric to a structural fact:
the distribution is determined by how many entities and activities exist
in each perspective, not by counting flat events.
"""
