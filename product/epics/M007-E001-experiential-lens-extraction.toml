# Epic: Rewrite lens extraction prompts to ground candidates in user experience
# Problem: Lenses extract from marketing pages and produce abstract business outcomes
# Solution: Reframe every lens question as "What does a user DO in this product?"

id = "M007-E001"
parent = "M007"
title = "Experiential Lens Extraction"
status = "complete"
created = 2026-02-12

[outcome]
description = """
All 7 analytical lenses produce candidates grounded in what users actually experience
inside the product, not abstract business outcomes from marketing copy. Each candidate
describes a concrete user action or moment that happens while using the product.
Candidates like "Automate protection of sensitive business information" are impossible
to produce — they would be caught by anti-patterns or never generated.
"""

job_story = """
When I run the analysis pipeline on a product website,
I want lens candidates to describe things users DO inside the product,
so that the resulting value moments feel accurate to someone who actually uses the product.
"""

