[notes]
considerations = """
Validation checks from the brief:
1. Feature disguised as value - starts with "Use the...", "Click the..."
2. Too vague to measure - "better visibility" without what's visible
3. Duplicate within same lens - similarity >0.85
4. Role mismatch - candidate attributed to wrong role
5. Unsupported by source - claim goes beyond crawled content
6. Hallucinated feature - references feature not in knowledge graph

Convergence approach:
1. Compute embeddings for all validated candidates
2. Cluster candidates with similarity >0.7 across different lenses
3. Use LLM to merge cluster into single named moment
4. Tier by lens count: 5+ = Tier 1, 3-4 = Tier 2, 1-2 = Tier 3

Expected output for Linear:
- 4-6 Tier 1 moments (high confidence, obvious value)
- 4-8 Tier 2 moments (likely real, worth measuring)
- 5-15 Tier 3 moments (possible, needs validation)
"""

estimated_stories = 4
