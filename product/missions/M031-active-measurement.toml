# Mission: Active Measurement
# Cross-reference ICP segments with outcomes, measurement events, and activity rules

id = "M031"
title = "Active Measurement"
status = "draft"
created = 2026-03-26
depends_on = ["M024", "M030", "M028"]

[outcome]
description = """
A new "Active Measurement" section brings everything together. For each ICP segment,
it shows:

1. Which outcomes apply to this segment (e.g., "O1: sends 200 genuinely personalized emails")
2. Measurement events needed to verify (entity.activity names)
3. An "is active when" rule defining what activity pattern indicates active usage
4. Metrics to verify and dive deeper (derived metrics for ongoing monitoring)

This is the synthesis section — it cross-references ICP profiles, outcomes, measurement
spec events, and lifecycle states into a per-segment action plan. It answers: "For this
user type, what should we measure, when are they active, and how do we verify success?"
"""

user_progress = "From 'separate sections for ICPs, outcomes, and measurement' to 'a unified per-segment measurement plan showing exactly what to track and why'"

[testing]
approach = "agent-judgment"
criteria = [
    "Active Measurement section appears after ICP Segments",
    "Section has educational intro: 'bring it all together, pick segments and value outcomes'",
    "Each ICP segment gets a card with outcome references",
    "Each card shows measurement events needed (entity.activity format)",
    "Each card shows 'is active when' activity rule",
    "Each card shows metrics to verify and dive deeper",
    "Data is generated by cross-referencing existing outputs (ICPs, outcomes, measurement spec, lifecycle)",
    "Section degrades gracefully when some outputs are missing",
    "Existing tests pass",
    "New tests cover cross-reference generation and rendering",
]

validator_context = [
    "packages/cli/src/commands/view-sections.ts",
    "packages/mcp-server/src/analysis/outputs/index.ts",
]

[context]
related_docs = ["VISION.md", "VALUES.md"]
relevant_paths = [
    "packages/cli/src/commands/view-sections.ts",
    "packages/cli/src/commands/view-html.ts",
    "packages/mcp-server/src/analysis/outputs/index.ts",
    "packages/mcp-server/src/analysis/outputs/icp-profiles.ts",
    "packages/mcp-server/src/analysis/outputs/activation-map.ts",
    "packages/mcp-server/src/analysis/outputs/measurement-spec.ts",
    "packages/core/src/types/outputs.ts",
]

[scope]
in_scope = [
    "New active-measurement output generator that cross-references ICPs, outcomes, measurement spec, and lifecycle states",
    "Per-ICP output: applicable outcomes, measurement events, activity rule, verification metrics",
    "LLM-assisted generation of 'is active when' rules per ICP",
    "New renderActiveMeasurementSection() in view-sections.ts",
    "Wire into pipeline and report",
    "Storage: outputs/active-measurement.json",
]
out_of_scope = [
    "Actual metric computation or dashboards",
    "SDK or tracking implementation",
    "Changes to underlying output generators",
]
acceptable_breakage = [
    "New output file added to outputs/",
    "Section nav gains a new item",
    "Pipeline gains a new post-processing step",
]

[notes]
considerations = """
WIREFRAME REFERENCE:
The wireframe shows per-ICP cards:

  Sales Development Representative
  ─────────────────────────────────
  O1: sends 200 genuinely personalized emails per week
  O4: ---

  Measurement needed        │ Metrics to verify and dive deeper
  workflow.executed          │ personalization_workflow_executions
  contact.enriched           │ contacts_enriched_per_week
  ai_agent.executed          │ ai_agent_usage_frequency
                             │ share_sdrs_achieving_different_outcomes

  Is active when:
  - workflow.executed 3+ times in the last 30 days

GENERATION APPROACH:
This is a synthesis step that runs after all other outputs. It takes:
- ICPProfile[] (from ICP generation)
- OutcomeItem[] (from outcome generation)
- MeasurementSpec (from measurement spec generation)
- LifecycleStatesResult (from lifecycle generation)

And produces per-ICP active measurement cards via LLM or rule-based cross-referencing.
The "is active when" rules can be derived from the measurement spec entities and
lifecycle state entry criteria.
"""
