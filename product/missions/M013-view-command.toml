# Mission: View Command — Browser-Based Profile Viewing
# A `basesignal view` command that starts a local HTTP server and opens
# scan results in the browser, making profiles easy to review.

id = "M013"
title = "View Command — Browser-Based Profile Viewing"
status = "complete"
created = 2026-03-01
depends_on = []

[outcome]
description = """
Running `basesignal view` starts a tiny local HTTP server and opens the browser
to a product list page showing all scanned products. Running `basesignal view <slug>`
opens directly to that product's report. The report renders all profile sections —
identity, journey stages, ICP profiles, activation map, measurement spec, lifecycle
states, and value moments — in a clean, readable HTML page that a non-technical PM
can understand without explanation. The server runs until Ctrl+C and requires no
external services or accounts.
"""

user_progress = "From 'scan results are JSON files I can only read in the terminal' to 'scan results open in my browser as a clean, navigable report'"

[testing]
approach = "agent-judgment"
criteria = [
    "`basesignal view` starts an HTTP server on a local port and opens the default browser",
    "`basesignal view` with no arguments shows a product list page with all scanned products",
    "`basesignal view <slug>` opens directly to that product's report",
    "Product list shows product name, URL, scan date, and completeness for each product",
    "Product report renders Identity section (name, description, target customer, business model, confidence)",
    "Product report renders Journey/Activation Map section (stages, signal strength, triggers, drop-off risk)",
    "Product report renders ICP Profiles section (name, description, pain points, activation triggers, success metrics)",
    "Product report renders Measurement Spec section (product/customer/interaction entities with properties and activities)",
    "Product report renders Lifecycle States section (states, entry/exit criteria, transitions)",
    "Product report renders Value Moments section (tiered, with contributing lenses)",
    "Each section shows confidence scores where available",
    "Missing sections show a clear 'not yet analyzed' indicator, not broken HTML",
    "In-page navigation lets users jump between sections",
    "Server responds to Ctrl+C with clean shutdown",
    "The view command is registered and works after `npm run build`",
    "All existing tests pass (`npm run test:run`)",
    "`npm run build` succeeds across all packages",
    "A non-technical person can understand the report without needing the terminal",
]

