[notes]
considerations = """
Codebase exploration findings (2026-03-01):

**Current state:**
- Three text output formats exist: summary (terminal), markdown, json
- No HTML generation anywhere in the codebase
- No HTTP server — serve command is MCP-over-stdio only
- No web dependencies in CLI package
- ProductDirectory stores rich structured data in ~/.basesignal/products/{slug}/
- FileStorage stores profile JSON in ~/.basesignal/profiles/{id}.json
- Two parallel formatter systems exist (CLI formatters + MCP export formatters)

**Available data per product:**
- profile.json (combined profile with identity, journey, completeness)
- outputs/icp-profiles.json, activation-map.json, measurement-spec.json, lifecycle-states.json
- convergence/value-moments.json
- lenses/*.json (7 lens results)
- crawl/pages.json, metadata.json

**Technology choices:**
- Node built-in `http` module for server (zero new dependencies for HTTP)
- Template literal functions for HTML generation (no templating library)
- Inline CSS for styling (no build step for assets, self-contained)
- `open` npm package or child_process for browser auto-open
- ProductDirectory.readJson() and listProducts() for data access

**Architecture:**
- New file: packages/cli/src/commands/view.ts
- Server-rendered HTML approach (not SPA — no client-side JS framework needed)
- Template functions: renderProductList(products), renderProductReport(slug, data)
- HTML templates can be extracted to separate files if they grow large
- Route structure: GET / (product list), GET /:slug (product report)

**Epic breakdown suggestion:**
E001: Command scaffolding + HTTP server + product list page
E002: Product report page with all sections rendered
E003: Styling, navigation, and polish
"""
