# Mission: Activation Context & Metrics
# Add educational context, tracking guidance, and standard metrics to activation section

id = "M028"
title = "Activation Context & Metrics"
status = "draft"
created = 2026-03-26
depends_on = ["M014", "M002"]

[outcome]
description = """
The Activation section in the HTML report gains three new subsections beyond the
existing journey table and transitions:

1. Activation Context: An educational introduction explaining what activation means
   ("glimpses of value", "aha moments") with a link to a video resource.

2. Track Activations: A concrete list of events and properties that need to be
   implemented and tested, plus segments/audiences to create in analytics tools.

3. Activation Metrics: Standard metrics to track activation effectiveness:
   - Activation Rate (activated accounts / all new accounts)
   - Activated New Subscription Rate (activated → subscribed)
   - 30/60/90d retention for activated vs all users
   - Conversion rate delta (activated vs non-activated)
   - Time to activated goal test

Each metric includes a description and interpretation guidance (e.g., "if <50%,
your activation does not indicate subscription success").
"""

user_progress = "From 'activation shows a journey table' to 'activation gives a complete playbook: context, what to track, and how to measure success'"

[testing]
approach = "agent-judgment"
criteria = [
    "Activation section starts with educational context paragraph",
    "Track Activations subsection lists events/properties to implement",
    "Track Activations lists segments/audiences to create",
    "Activation Metrics subsection renders standard metrics in a 2-column card layout",
    "Each metric card has name, formula description, and interpretation guidance",
    "Metrics are generated from activation map data (not hardcoded)",
    "Existing tests pass",
    "New tests cover metric rendering",
]

validator_context = [
    "packages/cli/src/commands/view-sections.ts",
    "packages/mcp-server/src/analysis/outputs/activation-map.ts",
]

[context]
related_docs = ["VISION.md", "VALUES.md"]
relevant_paths = [
    "packages/cli/src/commands/view-sections.ts",
    "packages/cli/src/commands/view-html.ts",
    "packages/mcp-server/src/analysis/outputs/activation-map.ts",
    "packages/core/src/types/outputs.ts",
]

[scope]
in_scope = [
    "Educational context block with activation explanation",
    "Track Activations: derive events/properties from activation map trigger_events and measurement spec",
    "Track Activations: derive segment definitions from activation levels",
    "Activation Metrics: generate standard metric definitions from activation map data",
    "Metric interpretation guidance (generated by LLM or template-based)",
    "2-column card layout for metrics",
    "Extend activation map output or add a separate activation-metrics output",
]
out_of_scope = [
    "Changes to activation level detection logic",
    "Actual metric calculation (this is specification, not computation)",
    "Dashboard or chart rendering",
]
acceptable_breakage = [
    "Activation section HTML structure expands significantly",
    "Activation map output may gain new fields for metric definitions",
]

[notes]
considerations = """
WIREFRAME REFERENCE:
The wireframe shows three distinct areas after the Activation Journey table:

1. "Track activations" — "These events and properties need to be implemented and tested"
   Plus: "You need to create the following audiences/segments in your analytics tool
   or in your data model"

2. "Activation metrics" — 2-column layout with cards:
   Left column:
   - Activation Rate: number of activated accounts / all new accounts
   - 30,60,90d retention for activated users vs all users
   - Time to activated goal test
   Right column:
   - Activated New Subscription Rate: new subscriptions that were activated / all
   - Conversion rate delta: activated vs non-activated conversion

Each metric card includes description + interpretation guidance (what good/bad looks like).

DATA GENERATION:
The metrics definitions can be generated by the LLM during the activation map generation
step, or as a post-processing step. The events to track come from activation map
trigger_events. The segments to create correspond to activation levels.
"""
