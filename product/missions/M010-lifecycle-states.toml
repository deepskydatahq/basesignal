[notes]
considerations = """
Codebase exploration findings (2026-02-22):

**What already exists:**
- DefinitionsMap in profile.ts has placeholder lifecycle fields: firstValue, active, atRisk, churn
  (string-based criteria, not structured output)
- MeasurementSpec has userStateModel with 5 states: new, activated, active, at_risk, dormant
  (embedded in measurement spec, generated from LLM prompt, basic criteria only)
- State-transitions lens exists but is about product workflow transitions, not user lifecycle

**Architecture decision: Standalone output generator (recommended)**
The lifecycle states output should follow the same pattern as icp-profiles.ts,
activation-map.ts, and measurement-spec.ts — a standalone generator with its own
system prompt, prompt builder, response parser, and generator function.

Reasons:
1. Separation of concerns — measurement spec focuses on instrumentation, activation
   map on value progression, lifecycle states on user health/retention modeling
2. Can run in parallel with other outputs in the pipeline
3. Richer schema possible (time windows, transition paths, resurrection criteria)
4. Existing output generators are 250-400 lines each — adding lifecycle complexity
   to measurement-spec.ts would make it unmanageable

**Integration points (5 files to modify, 1 to create):**
1. CREATE: packages/mcp-server/src/analysis/outputs/lifecycle-states.ts
2. MODIFY: packages/core/src/types/outputs.ts (add LifecycleStatesResult type)
3. MODIFY: packages/core/src/schema/outputs.ts (add Zod schema)
4. MODIFY: packages/mcp-server/src/analysis/outputs/index.ts (add to generateAllOutputs)
5. MODIFY: packages/mcp-server/src/analysis/pipeline.ts (wire into pipeline)
6. MODIFY: packages/mcp-server/src/analysis/types.ts (add progress phase)

**Input data for lifecycle states generator:**
- ValueMoment[] (from convergence — what users experience)
- ActivationLevel[] (from extraction — the activation funnel)
- ActivationMapResult (from activation map output — stages and transitions)
- CoreIdentity (from extraction — product category, business model)
The generator needs product context to make time windows product-appropriate.

**Relationship to measurement spec userStateModel:**
Two options:
A) Lifecycle states output replaces userStateModel — measurement spec references it
B) Lifecycle states output is canonical, userStateModel is a simplified projection
Option B is safer for backward compatibility. The measurement spec can derive its
userStateModel from the lifecycle states output.

**Epic breakdown suggestion:**
E001: Core types and schema (types + Zod in @basesignal/core)
E002: Lifecycle states generator (the output generator itself)
E003: Pipeline integration and measurement spec alignment
Each epic is independently testable and builds on the previous.

**Timo's note:** L05 is broad and may span multiple missions. M010 focuses on
generating lifecycle state definitions from scan data. Future missions may add
refinement tools, richer transition modeling, or time-series analysis.
"""
