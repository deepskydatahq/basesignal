# Mission: Lifecycle States
# Generate product-specific lifecycle state definitions from scan data —
# completing the user journey from activation through churn and resurrection.

id = "M010"
title = "Lifecycle States"
status = "draft"
created = 2026-02-22
depends_on = ["M002", "M008"]

[outcome]
description = """
Running `basesignal scan <url>` produces a standalone lifecycle states output alongside
the existing ICP profiles, activation map, and measurement spec. The output defines a
complete user lifecycle state machine — new, activated, engaged, at-risk, dormant,
churned, resurrected — with product-specific entry criteria, exit triggers, time windows,
and transition paths. States are grounded in the product's actual value moments and
activation levels, not generic SaaS templates. The measurement spec's existing
userStateModel is replaced by (or references) the richer lifecycle states output.
"""

user_progress = "From 'activation funnel only — no post-activation intelligence' to 'complete lifecycle state machine with retention, churn, and resurrection definitions'"

[testing]
approach = "agent-judgment"
criteria = [
    "Scan output includes a lifecycle_states section as a new top-level output",
    "At minimum 7 states are defined: new, activated, engaged, at_risk, dormant, churned, resurrected",
    "Each state has: name, definition, entry_criteria (measurable), exit_triggers, time_window",
    "Transitions between states are explicit with trigger conditions",
    "States reference product-specific value moments and activation levels — not generic placeholders",
    "Time windows are product-appropriate (e.g. B2C daily app vs B2B monthly tool have different 'at_risk' windows)",
    "The 'activated' state aligns with the existing activation map's primary activation level",
    "Lifecycle states types are defined in @basesignal/core with Zod schemas",
    "Lifecycle states generator follows the same pattern as existing output generators (icp-profiles, activation-map, measurement-spec)",
    "The measurement spec's userStateModel references or is derived from the lifecycle states output",
    "Pipeline generates lifecycle states as part of the standard scan flow",
    "All existing tests continue to pass — no regressions",
    "Miro test case produces lifecycle states a PM would recognize as accurate for a B2B collaboration tool",
]

