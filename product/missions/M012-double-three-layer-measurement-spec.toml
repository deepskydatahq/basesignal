[notes]
considerations = """
Codebase exploration findings (2026-02-27):

**Blast radius:** ~15 files across 4 packages (core, mcp-server, cli, storage).
~80+ tests reference the current MeasurementSpec shape.

**Current structure (wrong):**
{ entities[], events[], total_events, coverage, userStateModel[], confidence }
- Events are a flat array separated from entities
- Properties are per-event, not per-entity
- Activities mix lifecycle markers with UI interactions
- No distinction between product/customer/interaction layer structure
- No derivation rules for customer journey stages

**Target structure (Double Three-Layer Framework):**
{
  perspectives: {
    customer: { entities: [{ name, activities: [{ name, derivation_rule, properties_used }], properties }] },
    product: { entities: [{ name, activities: [{ name, properties_supported }], properties }] },
    interaction: { entities: [{ name, activities: [{ name, properties_supported }], properties }] }
  },
  jsonSchemas: [{ entityName, schema: { ... JSON Schema ... } }],
  confidence, sources
}

**Key design decisions from framework author:**
1. Perspectives ARE top-level grouping (determines how activities are designed and consumed)
2. Activities live inside entities (entity groups activities defining its lifecycle)
3. Properties defined at entity level, activities declare properties_supported subset
4. Customer activities need derivation_rule (composed from product activities with filters/thresholds)
5. Interaction layer: generic activities (element_clicked, element_submitted) + contextual properties
6. Entity count: not hard-capped at 7, but challenge each entity (unique ID + distinct lifecycle)
7. Output format: JSON Schema per entity (activity as enum, properties as fields)
8. Past-tense activities only in product layer — test: "Does this prove or unlock user value?"

**Reference: Miro product layer entities:**
Account (created, updated, deleted)
User (invited, created, role_changed, removed_from_account, deleted)
Board (joined, created, updated, viewed, shared, presented, deleted) — heartbeat
Asset (added, updated, deleted, commented)
Subscription (created, canceled, ended)

**Reference: Miro customer layer:**
Single Customer entity with derived stages:
- Miro experienced first time (Board viewed, first time, anonymous)
- Account created (mapped from product Account created)
- First value created (Board shared first time OR Asset created 30+ times)
- Value repeated, Value creation reduced, Subscription created, etc.

**Epic breakdown suggestion:**
E001: Core types and Zod schemas (new type structure in @basesignal/core)
E002: LLM prompt, parser, and validator (rewrite generation logic)
E003: Pipeline integration, CLI, storage, MCP tools (wire everything together)
E004: JSON Schema generation (per-entity schema output)
Each epic builds on the previous and is independently testable.
"""
