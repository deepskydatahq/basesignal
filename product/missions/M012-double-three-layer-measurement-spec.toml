# Mission: Double Three-Layer Measurement Spec
# Redesign the measurement spec output to properly follow the Double Three-Layer
# Framework — entity-centric, perspective-grouped, with JSON Schema per entity.

id = "M012"
title = "Double Three-Layer Measurement Spec"
status = "draft"
created = 2026-02-27
depends_on = ["M011"]

[outcome]
description = """
Running `basesignal scan <url>` produces a measurement specification that follows the
Double Three-Layer Framework from the book. The output is organized by three perspectives
(Customer, Product, Interaction), each containing entities with nested activities and
entity-level properties. Product entities (3-7) have past-tense lifecycle activities with
properties_supported declarations. The Customer entity has derived activities with
derivation_rules composed from product activities. The Interaction entity has generic
activities (element_clicked, element_submitted) with contextual properties. Each entity
also produces a JSON Schema (activity as enum, properties as fields) that serves as the
tracking contract an engineer implements against. The output replaces the current flat
{ entities[], events[] } structure entirely.
"""

user_progress = "From 'flat event list with per-event properties' to 'entity-centric measurement spec with perspective grouping, entity-level properties, derived customer activities, and JSON Schema per entity'"

