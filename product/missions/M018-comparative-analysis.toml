# Mission: Comparative Analysis
# Compare two scanned products side by side in a visual HTML report

id = "M018"
title = "Comparative Analysis"
status = "active"
created = 2026-03-04
depends_on = ["M013"]

[outcome]
description = """
Add a compare command that generates a side-by-side HTML comparison of two scanned products.
Compare identity, ICP profiles, activation journey, value moments, measurement spec, lifecycle
states, and outcomes. Highlight shared attributes and differences. Serve as a new route on
the existing view server.
"""

user_progress = "From 'isolated product profiles' to 'side-by-side growth model comparison'"

[testing]
approach = "agent-judgment"
criteria = [
    "basesignal compare <slug1> <slug2> opens browser with side-by-side comparison",
    "All 7 sections render with data from both products",
    "Shared attributes marked with badge-shared CSS class",
    "Missing sections show 'Not yet analyzed' gracefully",
    "GET /compare/{slug1}/{slug2} returns 200 on view server",
    "All tests pass including new compare tests",
]

validator_context = [
    "packages/cli/src/commands/compare-sections.ts",
    "packages/cli/src/commands/compare.ts",
    "packages/cli/src/commands/compare.test.ts",
]

[context]
related_docs = ["VISION.md"]
relevant_paths = [
    "packages/cli/src/commands/view-sections.ts",
    "packages/cli/src/commands/view-html.ts",
    "packages/cli/src/commands/view.ts",
    "packages/cli/src/commands/view.test.ts",
    "packages/cli/src/program.ts",
    "packages/storage/src/product-directory.ts",
]

[scope]
in_scope = [
    "New compare CLI command accepting two slugs",
    "Side-by-side HTML comparison view with CSS grid layout",
    "7 section comparison renderers matching existing view sections",
    "Shared attribute highlighting (badge-shared)",
    "Compare route on existing view server",
    "Comprehensive tests following view.test.ts patterns",
]
out_of_scope = [
    "Auto-scanning URLs (slugs only, must be pre-scanned)",
    "JSON or CLI text output formats",
    "More than 2 products at once",
    "Compare UI on the product list page",
    "Semantic diffing of descriptions",
]
acceptable_breakage = []

[notes]
considerations = """
Single epic with 4 sequential stories: renderPage extension → comparison renderers → CLI command + route → tests.
Reuse all existing CSS classes and rendering patterns from view-sections.ts and view-html.ts.
CSS grid layout at max-width 1400px (vs 960px for single product). Responsive stacking below 900px.
"""
