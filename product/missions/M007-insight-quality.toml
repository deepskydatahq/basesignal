# Mission: Insight Quality
# Fix the semantic quality of pipeline outputs — value moments should be user-experienced,
# measurement events should follow the Double Three-Layer Framework

id = "M007"
title = "Insight Quality"
status = "complete"
completed = 2026-02-14
created = 2026-02-12
depends_on = ["M006"]

[outcome]
description = """
Analysis pipeline produces insights that a product team recognizes as accurate and
actionable. Value moments describe things users actually experience in the product
(not abstract business outcomes). Measurement specs follow the Double Three-Layer
Framework: entities define properties once, events inherit them, and every event
answers "what did the user accomplish?" not "what did the user click?"
"""

user_progress = "From 'technically structured but generic insights' to 'insights that make a product team say yes, that's exactly right'"

[testing]
approach = "agent-judgment"
criteria = [
    "Value moments describe user-experienced moments, not abstract business outcomes (e.g., 'Create a shared visual workspace for real-time brainstorming' not 'Automate protection of sensitive business information')",
    "No value moment would make a user say 'that's not what I experience when I use this product'",
    "Value moments are specific enough to map to product features/surfaces, not just marketing themes",
    "Measurement spec entities have properties defined once at entity level (3-7 reusable properties per entity)",
    "Event properties are inherited from their parent entity plus event-specific additions — not invented from scratch",
    "Events follow entity_action naming where action is past-tense (board_created, asset_shared)",
    "Measurement spec covers three perspectives: Customer (journey state), Product (entity lifecycle), Interaction (specific actions)",
    "User state model is derivable from the generated events (new, activated, active, at_risk, dormant)",
    "Miro test case produces recognizable value moments and a measurement spec that a Miro PM would validate"
]

