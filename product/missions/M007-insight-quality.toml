[notes]
considerations = """
Feedback from Miro test run (2026-02-12), second round after M006 structural fixes:

**Problem 1: Value Moments Are Too Abstract**
Current pipeline produces moments like:
- "Automate protection of sensitive business information" — not a core Miro value
- "Visualize customer journey evolution for strategic decision-making" — too high-level
Value moments should be things a user EXPERIENCES while using the product:
- "Build a shared whiteboard with your team in real-time"
- "Drag a sticky note to vote on the best idea"
- "Export a polished diagram to share in a presentation"
Nobody uses Miro and thinks "I just automated protection of sensitive business info."

Root cause: Lens prompts extract from marketing pages and ask abstract questions
("What new capacities does this product unlock?"). The lenses need to ask
"What does a user DO in this product that delivers value?" and filter out
marketing language that doesn't map to in-app experiences.

**Problem 2: Measurement Spec Events Lack Framework**
Entities are correct but events and properties underneath are generic/invented.
Should follow the Double Three-Layer Framework (timo.space blog):

Layer 1 — Entities (nouns): The core objects in the product (3-7 max)
  Example: Account, Board, Asset (for Miro)
  Each entity defines reusable properties: board_id, board_template_used, etc.

Layer 2 — Activities (past-tense verbs): Events marking entity lifecycle progress
  Example: Board Created, Board Shared, Board Exported
  Each event inherits ALL properties from its parent entity + event-specific additions

Layer 3 — Three Perspectives:
  Customer layer: "Where is the user in their journey?" (executives, growth)
  Product layer: "Which feature/object did they touch?" (product, data teams)
  Interaction layer: "What exactly did they click/view?" (UX, researchers)

Key rules:
- Design properties at the ENTITY level, reuse everywhere
- Events answer "What did they accomplish?" not "What did they click?"
- A user state model (new, activated, active, at_risk, dormant) should be
  derivable from the generated events

The existing measurementPlan.ts CRUD already supports this entity-activity-properties
structure. The spec generator needs to produce output that aligns with it.
"""
